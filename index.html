<!-- Portal Animation -->
<script>
(function(){
  const canvas = document.getElementById('portal-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let W, H, particles = [], petals = [], startTime = Date.now(), phase = 0;
  const GLYPHS = [
    '火','水','木','金','土','空','海','山','月','日','星','雲',
    '心','力','技','術','道','夢','光','鬼','天','刀','桜','雨',
    'モデル','データ','コード','ネット','テック','システム',
    '機械学習','人工知能','神経網','電脳','未来',
    'OPTUNA','CATBOOST','PYTORCH','GPU:0','∇L','θ','∑','β','η',
    '0.001','1e-4','99.2%','128','512','2048',
    '一','二','三','四','五','六','七','八','九','十'
  ];
  function resize(){ W=canvas.width=canvas.offsetWidth; H=canvas.height=canvas.offsetHeight; }
  function spawnP(){
    const ang=Math.random()*Math.PI*2, r=Math.random()*220+30;
    particles.push({
      x:Math.cos(ang)*r, y:Math.sin(ang)*r, z:Math.random()*2000+200,
      vz:-(Math.random()*12+5),
      word:GLYPHS[Math.floor(Math.random()*GLYPHS.length)],
      size:Math.random()*11+6,
      hue:Math.random()<.5?20+Math.random()*30:340+Math.random()*25,
      sat:85+Math.random()*15, lig:55+Math.random()*35
    });
  }
  function spawnPetal(){
    petals.push({x:Math.random()*W,y:-20,vx:(Math.random()-.5)*1.5,vy:Math.random()*1.4+0.6,
      r:Math.random()*6+4,rot:Math.random()*Math.PI*2,rotV:(Math.random()-.5)*.06,
      sway:Math.random()*Math.PI*2,alpha:Math.random()*.5+.3});
  }
  function drawTorii(cx,cy,scale,alpha){
    ctx.save(); ctx.globalAlpha=alpha*0.75;
    ctx.fillStyle=`rgba(160,20,10,${alpha*.6})`;
    ctx.strokeStyle=`rgba(200,40,20,${alpha})`;
    ctx.lineWidth=3*scale;
    const W2=90*scale,H2=80*scale,post=8*scale;
    ctx.fillRect(cx-W2+post,cy-H2*.4,post*1.2,H2*.9);
    ctx.fillRect(cx+W2-post*2,cy-H2*.4,post*1.2,H2*.9);
    ctx.fillRect(cx-W2-8*scale,cy-H2,W2*2+16*scale,post);
    ctx.fillRect(cx-W2,cy-H2+post*1.5,W2*2,post*.7);
    ctx.beginPath();
    ctx.moveTo(cx-W2-10*scale,cy-H2+2);
    ctx.quadraticCurveTo(cx,cy-H2-12*scale,cx+W2+10*scale,cy-H2+2);
    ctx.stroke();
    ctx.restore();
  }
  function draw(){
    const elapsed=(Date.now()-startTime)/1000;
    ctx.fillStyle='rgba(10,3,3,0.13)';
    ctx.fillRect(0,0,W,H);
    if(elapsed<1.2)phase=0;
    else if(elapsed<4.5){phase=1;if(particles.length<280)spawnP();if(Math.random()<.06)spawnPetal();}
    else phase=2;
    const cx=W/2,cy=H/2;
    particles.forEach(p=>{
      p.z+=p.vz*(phase===2?4:1);if(p.z<1)p.z=2000;
      const sc=400/p.z,sx=cx+p.x*sc,sy=cy+p.y*sc;
      const alpha=Math.min(1,Math.max(0.06,(2000-p.z)/2000));
      ctx.save();ctx.globalAlpha=alpha;
      ctx.fillStyle=`hsl(${p.hue},${p.sat}%,${p.lig}%)`;
      ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=Math.max(4,sc*8);
      ctx.font=`${Math.max(7,p.size*sc)}px 'Noto Sans JP','VT323',monospace`;
      ctx.textAlign='center';ctx.fillText(p.word,sx,sy);ctx.restore();
    });
    petals.forEach(p=>{
      p.y+=p.vy;p.x+=p.vx+Math.sin(p.sway)*0.6;p.sway+=0.015;p.rot+=p.rotV;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      ctx.globalAlpha=p.alpha*Math.min(1,elapsed-1.2);
      ctx.fillStyle='#ffb7c5';ctx.beginPath();ctx.ellipse(0,0,p.r,p.r*.55,0,0,Math.PI*2);ctx.fill();ctx.restore();
    });
    if(elapsed>1.8){drawTorii(cx,cy+50,0.7+Math.sin(elapsed*.4)*.04,Math.min(.65,(elapsed-1.8)/1.5));}
    if(phase===2&&elapsed>5.0){const fade=Math.min(1,(elapsed-5.0)/0.9);ctx.fillStyle=`rgba(10,3,3,${fade})`;ctx.fillRect(0,0,W,H);}
    if(elapsed<6.5)requestAnimationFrame(draw);
    else{const p=document.getElementById('portal');p.classList.add('done');setTimeout(()=>p.style.display='none',900);}
  }
  resize();window.addEventListener('resize',resize);
  for(let i=0;i<80;i++)spawnP();
  draw();
})();
</script>

function useSakura(canvasId) {
  React.useEffect(() => {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let W = canvas.width = window.innerWidth;
    let H = canvas.height = window.innerHeight;
    const onR = () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; };
    window.addEventListener('resize', onR);

    const COLORS = ['#ffb7c5','#ff9eb5','#ffc8d5','#ffe0e8','#ff8fab'];
    class Petal {
      reset(){ this.x=Math.random()*W; this.y=-20-Math.random()*80; this.r=Math.random()*5+3; this.vy=Math.random()*1.2+0.4; this.vx=(Math.random()-0.5)*0.6; this.rot=Math.random()*Math.PI*2; this.rotV=(Math.random()-0.5)*0.04; this.sway=Math.random()*Math.PI*2; this.swayS=Math.random()*0.015+0.008; this.alpha=Math.random()*0.55+0.3; this.color=COLORS[Math.floor(Math.random()*COLORS.length)]; this.rx=this.r*(0.5+Math.random()*0.5); }
      constructor(){ this.reset(); this.y=Math.random()*H; }
      update(t){ this.y+=this.vy; this.x+=this.vx+Math.sin(this.sway+t*this.swayS)*0.5; this.rot+=this.rotV; if(this.y>H+20)this.reset(); if(this.x<-20)this.x=W+20; if(this.x>W+20)this.x=-20; }
      draw(ctx){ ctx.save(); ctx.translate(this.x,this.y); ctx.rotate(this.rot); ctx.globalAlpha=this.alpha; ctx.fillStyle=this.color; ctx.beginPath(); ctx.ellipse(0,0,this.rx,this.r,0,0,Math.PI); ctx.ellipse(0,0,this.rx*0.7,this.r,0,Math.PI,Math.PI*2); ctx.fill(); ctx.restore(); }
    }
    const petals = Array.from({length:75},()=>new Petal());
    let t=0, raf;
    function loop(){ ctx.clearRect(0,0,W,H); t++; petals.forEach(p=>{p.update(t);p.draw(ctx);}); raf=requestAnimationFrame(loop); }
    loop();
    return ()=>{ cancelAnimationFrame(raf); window.removeEventListener('resize',onR); };
  }, []);
}

function useParallax() {
  const [p, setP] = React.useState({x:0.5, y:0.5});
  React.useEffect(() => {
    const move = e => setP({x:e.clientX/window.innerWidth, y:e.clientY/window.innerHeight});
    window.addEventListener('mousemove', move);
    return () => window.removeEventListener('mousemove', move);
  }, []);
  return p;
}

function App() {
  const [scene, setScene] = React.useState('hero');
  const [contactOpen, setContactOpen] = React.useState(false);

  const goBack = () => setScene('hero');

  /* Stars for night mode */
  React.useEffect(() => {
    const layer = document.getElementById('stars-layer');
    if (!layer || layer.children.length) return;
    for (let i=0;i<60;i++){
      const s=document.createElement('div');s.className='star';
      s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*40}%;width:${Math.random()*2+1}px;height:${Math.random()*2+1}px;--sa:${(Math.random()*0.5+0.2).toFixed(2)};--sd:${(Math.random()*3+1.5).toFixed(1)}s;animation-delay:${(Math.random()*3).toFixed(1)}s;`;
      layer.appendChild(s);
    }
  }, []);

  return (
    <>
      <HeroV scene={scene}
        onEnter={s => setScene(s)}
        onContact={() => setContactOpen(true)}/>

      {scene==='projects' && <ProjectsScene onBack={goBack}/>}
      {scene==='about'    && <AboutScene    onBack={goBack}/>}
      {scene==='skills'   && <SkillsScene   onBack={goBack}/>}
      {scene==='xp'       && <XPScene       onBack={goBack}/>}

      <ContactPostcard open={contactOpen} onClose={()=>setContactOpen(false)}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app-root')).render(<App/>);

/* Tweaks */
(function(){
  const g=id=>document.getElementById(id);
  let state={mode:'day',kana:true,accent:'#e4002b'};
  const apply=()=>{
    document.body.classList.toggle('night-mode',state.mode==='night');
    document.body.classList.toggle('no-kana',!state.kana);
    document.documentElement.style.setProperty('--accent',state.accent);
    ['tw-mode-day','tw-mode-night'].forEach(id=>g(id)&&g(id).classList.toggle('on',id===(state.mode==='night'?'tw-mode-night':'tw-mode-day')));
    ['tw-kana-on','tw-kana-off'].forEach(id=>g(id)&&g(id).classList.toggle('on',id===(state.kana?'tw-kana-on':'tw-kana-off')));
    document.querySelectorAll('#tweaks .swatch').forEach(s=>s.classList.toggle('sel',s.dataset.acc===state.accent));
  };
  const push=patch=>{state={...state,...patch};apply();};
  g('tw-mode-day').onclick=()=>push({mode:'day'});
  g('tw-mode-night').onclick=()=>push({mode:'night'});
  g('tw-kana-on').onclick=()=>push({kana:true});
  g('tw-kana-off').onclick=()=>push({kana:false});
  document.querySelectorAll('#tweaks .swatch').forEach(sw=>sw.onclick=()=>push({accent:sw.dataset.acc}));
  g('tweaks-toggle').onclick=()=>document.body.classList.toggle('tweaks-on');
  g('tw-close').onclick=()=>document.body.classList.remove('tweaks-on');
  apply();
})();
</script>
